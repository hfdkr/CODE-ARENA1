<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeArena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet"
        href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
    <link rel="stylesheet"
        href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-straight/css/uicons-solid-straight.css" />
    <link rel="stylesheet"
        href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    
    <!-- ══════════════════════════════════════════════════════
     AUTH SCREEN (fullscreen overlay)
══════════════════════════════════════════════════════ -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-bg-deco"></div>

        <div class="auth-box">
            <!-- Brand -->
            <div class="auth-brand">
                <span class="auth-brand-dot"></span>
                Code<span style="color:var(--blue)">Arena</span>
            </div>
            <p id="auth-subtitle" class="auth-sub">Welcome back — sign in to continue</p>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button id="tab-signin" class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
                <button id="tab-signup" class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- ── SIGN IN ── -->
            <div id="form-signin">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input id="si-email" type="email" class="form-input" placeholder="you@example.com" />
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-pw-wrap">
                        <input id="si-password" type="password" class="form-input" placeholder="Your password..."
                            onkeydown="if(event.key==='Enter')handleSignIn()" />
                        <button onclick="togglePwd('si-password',this)" class="pw-eye"><i
                                class="fi fi-rr-eye"></i></button>
                    </div>
                </div>
                <div style="text-align:right;margin-bottom:16px">
                    <span class="auth-link" onclick="openForgot()">Forgot password?</span>
                </div>
                <p id="si-error" class="auth-error hidden"></p>
                <button id="si-btn" onclick="handleSignIn()" class="btn-auth">Sign In →</button>
                <p class="auth-switch">Don't have an account? <span class="auth-link" onclick="switchTab('signup')">Sign
                        up free</span></p>
            </div>

            <!-- ── SIGN UP ── -->
            <div id="form-signup" style="display:none">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input id="su-name" type="text" class="form-input" placeholder="Your name..." />
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input id="su-email" type="email" class="form-input" placeholder="you@example.com" />
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-pw-wrap">
                        <input id="su-password" type="password" class="form-input" placeholder="Create a password..."
                            oninput="updateStrength(this.value)" />
                        <button onclick="togglePwd('su-password',this)" class="pw-eye"><i
                                class="fi fi-rr-eye"></i></button>
                    </div>
                    <div class="strength-bar">
                        <div id="strength-fill" class="strength-fill"></div>
                    </div>
                    <p id="strength-label" class="strength-label"></p>
                </div>
                <div class="form-group">
                    <label class="form-label">Security Question</label>
                    <select id="su-sq" class="form-input form-select">
                        <option value="">Choose a question...</option>
                        <option>What city were you born in?</option>
                        <option>What is your mother's maiden name?</option>
                        <option>What was the name of your first pet?</option>
                        <option>What is your favorite color?</option>
                        <option>What was the name of your primary school?</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Security Answer</label>
                    <input id="su-sa" type="text" class="form-input" placeholder="Your answer..." />
                </div>
                <p id="su-error" class="auth-error hidden"></p>
                <button id="su-btn" onclick="handleSignUp()" class="btn-auth">Create Account →</button>
                <p class="auth-switch">Already have an account? <span class="auth-link"
                        onclick="switchTab('signin')">Sign in</span></p>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════
     FORGOT PASSWORD MODAL
══════════════════════════════════════════════════════ -->
    <div id="forgot-modal" class="modal-overlay hidden">
        <div class="modal" style="max-width:420px">
            <!-- Step 1 -->
            <div id="fp-step1" class="modal-body">
                <div class="modal-header">
                    <h3>🔐 Reset Password</h3>
                    <button class="modal-close" onclick="closeForgot()"><i class="fi fi-rr-cross"></i></button>
                </div>
                <p style="color:var(--text2);font-size:.875rem;margin-bottom:20px">Enter your email to find your
                    security question.</p>
                <div style="display:flex;gap:8px">
                    <input id="fp-email" type="email" class="form-input" placeholder="you@example.com" style="flex:1" />
                    <button onclick="loadSecQ()" class="btn-secondary" style="flex-shrink:0">Find →</button>
                </div>
                <div id="fp-q-block" style="display:none;margin-top:18px">
                    <div class="form-group">
                        <label class="form-label">Security Question</label>
                        <p id="fp-q-text"
                            style="font-size:.9rem;color:var(--text);padding:12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)">
                        </p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Your Answer</label>
                        <input id="fp-answer" type="text" class="form-input" placeholder="Type your answer..." />
                    </div>
                    <button onclick="verifySecQ()" class="btn-auth">Verify Answer →</button>
                </div>
                <p id="fp-error" class="auth-error hidden"></p>
                <p class="auth-switch" style="margin-top:16px">Remember it? <span class="auth-link"
                        onclick="closeForgot()">Back to sign in</span></p>
            </div>
            <!-- Step 2 -->
            <div id="fp-step2" style="display:none" class="modal-body">
                <div class="modal-header">
                    <h3>🔑 New Password</h3>
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <div class="input-pw-wrap">
                        <input id="fp-newpwd" type="password" class="form-input" placeholder="New password (6+ chars)"
                            oninput="updateStrength(this.value)" />
                        <button onclick="togglePwd('fp-newpwd',this)" class="pw-eye"><i
                                class="fi fi-rr-eye"></i></button>
                    </div>
                    <div class="strength-bar">
                        <div id="strength-fill2" class="strength-fill"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input id="fp-confirm" type="password" class="form-input" placeholder="Repeat new password..." />
                </div>
                <p id="fp-reset-error" class="auth-error hidden"></p>
                <button onclick="doReset()" class="btn-auth">Reset Password →</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>

</html>
